services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: customer-api
    ports:
      - '8080:8080'
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8080
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--spider', 'http://localhost:8080/actuator/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - customer-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: customer-ui
    ports:
      - '3001:80'
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - customer-net

networks:
  customer-net:
    driver: bridge
